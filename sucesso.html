<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO -->
    <title>Pagamento Concluído — MailFlow Pro</title>
    <meta name="description" content="O seu pagamento foi processado com sucesso. Bem-vindo ao MailFlow Pro!">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📧</text></svg>">
    
    <style>
        .success-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-hero);
            padding: var(--space-6);
        }
        
        .success-card {
            background: var(--color-white);
            border-radius: var(--radius-2xl);
            padding: var(--space-12);
            box-shadow: var(--shadow-2xl);
            text-align: center;
            max-width: 480px;
            width: 100%;
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background: var(--color-success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--space-8);
        }
        
        .success-icon svg {
            width: 40px;
            height: 40px;
            color: var(--color-white);
        }
        
        .success-title {
            font-size: var(--font-size-2xl);
            font-weight: 700;
            color: var(--color-gray-800);
            margin-bottom: var(--space-4);
        }
        
        .success-message {
            color: var(--color-gray-600);
            font-size: var(--font-size-base);
            line-height: 1.7;
            margin-bottom: var(--space-8);
        }
    </style>
</head>
<body>
    <main class="success-page">
        <div class="success-card">
            <div class="success-icon" aria-hidden="true">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            
            <h1 class="success-title">Pagamento Concluído!</h1>
            
            <p class="success-message">
                Parabéns! O seu pagamento foi processado com sucesso.
                <br><br>
                Agora tem acesso ao MailFlow Pro. 
                Verifique o seu e-mail para as credenciais de acesso.
            </p>
            
            <a href="/" class="btn btn--primary btn--lg">
                Voltar ao Site
            </a>
        </div>
    </main>
</body>
</html>
