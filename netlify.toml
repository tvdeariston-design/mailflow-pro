[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/criar-sessao-pagamento"
  to = "/.netlify/functions/criar-checkout"
  status = 200

[[redirects]]
  from = "/webhook"
  to = "/.netlify/functions/webhook-stripe"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
